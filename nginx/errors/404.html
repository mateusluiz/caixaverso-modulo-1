<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>404 - Recurso nao encontrado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>O recurso solicitado nao foi encontrado neste servidor.</p>
  </div>
</body>
</html>
