<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>50x - Erro temporario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      max-width: 560px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>50x</h1>
    <p>Servico indisponivel temporariamente. Tente novamente em alguns instantes.</p>
  </div>
</body>
</html>
